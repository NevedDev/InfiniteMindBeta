<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste do GitHub Pages</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e24;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover { background: #4f46e5; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Teste de Publicação</h1>
        <p>Se você está vendo esta página, seu GitHub Pages está ONLINE!</p>
        <button onclick="alert('O JavaScript também está funcionando!')">Clique Aqui</button>
    </div>

</body>
</html>
